name: 每日抓取 GitHub Trending

on:
  schedule:
    # 每天 UTC 0:00 / 北京时间 8:00 运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 抓取并生成日报
        run: python scripts/fetch_trending.py

      - name: 提交更新
        run: |
          git config --local user.name "GitTrending Bot"
          git config --local user.email "bot@qiang-sens.github.io"
          git add -A
          # 如果有变更才提交
          git diff --staged --quiet || git commit -m "📊 每日更新 $(date +'%Y-%m-%d')"
          git push
