name: 每日抓取 GitHub Trending

on:
  schedule:
    # 每天 UTC 0:00 / 北京时间 8:00 运行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'  # 使用最新稳定版，避免版本精确匹配失败

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 抓取并生成日报
        run: python scripts/fetch_trending.py
        env:
          # 不需要 TOKEN，匿名 API 请求有 60/h 额度，够用
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 提交更新
        run: |
          git config --local user.name "GitTrending Bot"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📊 每日更新 $(date +'%Y-%m-%d')"
          git push
